<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Lyrics</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --lyrics-bg: var(--shell-background, #121212);
            --lyrics-surface: var(--card-bg, #1b1b1e);
            --lyrics-border: var(--border-glass, #333);
            --lyrics-text: var(--text-primary, #ffffff);
            --lyrics-muted: var(--text-secondary, #9ca3af);
            --lyrics-accent: var(--accent, #7c3aed);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--lyrics-bg);
            color: var(--lyrics-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
            border: 1px solid var(--lyrics-border);
        }

        /* Dedicated Title Bar */
        #titlebar {
            height: 32px;
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10000;
        }

        .drag-region {
            -webkit-app-region: drag;
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 15px;
        }

        /* Provider Select Dropdown */
        #provider-select {
            -webkit-app-region: no-drag;
            background: transparent;
            color: var(--lyrics-muted);
            border: none;
            font-weight: bold;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }

        #provider-select:hover {
            color: var(--lyrics-text);
        }

        #provider-select option {
            background-color: var(--lyrics-surface);
            color: var(--lyrics-text);
        }

        .window-controls {
            display: flex;
            height: 100%;
            -webkit-app-region: no-drag;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--lyrics-text);
            width: 32px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
            outline: none;
            opacity: 0.7;
        }

        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            opacity: 1;
        }

        .control-btn.close {
            width: 46px;
        }

        .control-btn.close:hover {
            background-color: #e81123;
        }

        /* Main Content Area */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #track-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #track-artist {
            font-size: 1rem;
            color: var(--lyrics-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #lyrics-container {
            flex-grow: 1;
            overflow-y: auto;
            text-align: center;
            /* Mask handles fade out at top/bottom of text area only */
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            padding: 10px 40px;
            /* Horizontal padding ensures text doesn't touch edges */
            scroll-behavior: smooth;
        }

        #sync-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .sync-control-btn {
            border: 1px solid var(--lyrics-border);
            border-radius: 999px;
            padding: 5px 9px;
            background: var(--lyrics-surface);
            color: var(--lyrics-muted);
            font: inherit;
            font-size: 0.72rem;
            cursor: pointer;
        }

        .sync-control-btn:hover,
        .sync-control-btn:focus-visible {
            color: var(--lyrics-text);
            border-color: var(--lyrics-accent);
            outline: none;
        }

        #offset-value {
            min-width: 74px;
            color: var(--lyrics-accent);
            font-size: 0.72rem;
            font-weight: 700;
        }

        #cache-status {
            width: 100%;
            color: var(--lyrics-muted);
            font-size: 0.66rem;
        }

        /* Hide Scrollbar */
        #lyrics-container::-webkit-scrollbar {
            display: none;
        }

        .lyric-line {
            display: block;
            width: 100%;
            border: 0;
            background: transparent;
            padding: 10px 10px;
            font-family: inherit;
            font-size: 1.1rem;
            color: #666;
            transition: color 0.3s, transform 0.3s, opacity 0.3s;
            cursor: pointer;
            opacity: 0.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
        }

        .lyric-line:hover {
            color: #999;
        }

        .lyric-line:focus-visible {
            outline: 1px solid rgba(255, 255, 255, 0.45);
            outline-offset: -1px;
            border-radius: 8px;
        }

        .lyric-line.active {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: bold;
            transform: scale(1.05);
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .lyric-word {
            --word-progress: 0%;
            color: inherit;
            transition: color 0.12s ease, text-shadow 0.12s ease;
        }

        .lyric-line.active .lyric-word {
            color: #8a8a8a;
        }

        .lyric-line.active .lyric-word.sung {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .lyric-line.active .lyric-word.current {
            color: transparent;
            background: linear-gradient(90deg, #ffffff 0 var(--word-progress), #8a8a8a var(--word-progress) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            text-shadow: none;
        }

        /* Static Mode Styles */
        .static-mode .lyric-line {
            color: #ddd;
            opacity: 1;
            font-size: 1.1rem;
            transform: none;
            padding: 5px 0;
            font-weight: normal;
            text-shadow: none;
        }

        .static-mode .lyric-word {
            color: inherit;
            background: none;
            text-shadow: none;
        }

        .static-mode .lyric-line:hover {
            color: #fff;
        }

        .plain-lyrics {
            white-space: pre-wrap;
            font-size: 1rem;
            line-height: 1.5;
            padding: 0 20px;
        }

        .lyrics-status {
            color: #666;
        }

        .lyrics-error {
            color: #ff6b6b;
        }

        .no-lyrics {
            color: #444;
            font-style: italic;
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <!-- Fixed Title Bar -->
    <div id="titlebar">
        <div class="drag-region">
            <select id="provider-select" title="Change Lyrics Provider">
                <option value="lrclib">LRCLIB (Synced)</option>
                <option value="genius">Genius (Text)</option>
                <option value="musixmatch">MusixMatch (Beta)</option>
            </select>
        </div>
        <div class="window-controls">
            <button class="control-btn" id="mode-btn" title="Toggle Sync/Static" style="margin-right: 5px;">
                <!-- Sync Icon (Default) -->
                <svg width="16" height="16" viewBox="0 0 24 24" id="icon-sync">
                    <path fill="currentColor"
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5 7.51-3.41L17.5 6.5 9.99 9.91 6.5 17.5zM12 10.9c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z" />
                </svg>
                <!-- Text/Static Icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" id="icon-static" style="display:none;">
                    <path fill="currentColor" d="M14 17H4v2h10v-2zm6-8H4v2h16V9zM4 15h16v-2H4v2zM4 5v2h16V5H4z" />
                </svg>
            </button>
            <button class="control-btn close" id="close-btn" title="Close">
                <svg width="10" height="10" viewBox="0 0 10 10">
                    <path fill="currentColor"
                        d="M10,1.01 L8.99,0 L5,3.99 L1.01,0 L0,1.01 L3.99,5 L0,8.99 L1.01,10 L5,6.01 L8.99,10 L10,8.99 L6.01,5 L10,1.01 Z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div id="main-content">
        <div id="header">
            <div id="track-title">Waiting for track...</div>
            <div id="track-artist">Spice Lyrics</div>
            <div id="sync-controls" aria-label="Lyrics timing controls">
                <button type="button" class="sync-control-btn" id="offset-minus" title="Show lyrics 0.5 seconds later">−0.5s</button>
                <span id="offset-value">Offset 0.0s</span>
                <button type="button" class="sync-control-btn" id="offset-plus" title="Show lyrics 0.5 seconds earlier">+0.5s</button>
                <button type="button" class="sync-control-btn" id="offset-reset">Reset</button>
                <button type="button" class="sync-control-btn" id="refresh-lyrics">Refresh</button>
                <span id="cache-status" role="status">Lyrics cache ready</span>
            </div>
        </div>
        <div id="lyrics-container">
            <div class="no-lyrics">Play a song to see lyrics</div>
        </div>
    </div>

    <script src="lyrics-core.js"></script>
    <script src="lyrics.js"></script>
</body>

</html>
